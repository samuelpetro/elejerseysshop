<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EleJeserys | Admin Login</title>
  <link rel="stylesheet" href="/css/estilos.css">
  <style>
    body { background: var(--gris1); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .admin-login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .admin-login-logo { text-align: center; margin-bottom: 30px; }
    .admin-login-logo .logo { font-size: 28px; font-family: var(--font-display); }
    .admin-login-logo .logo span { color: var(--amarillo); }
    .admin-login-logo p { color: var(--texto-muted); font-size: 13px; margin-top: 4px; }
    .admin-login-card .form-grupo { margin-bottom: 16px; }
    .admin-login-card .btn { width: 100%; margin-top: 8px; }
    .error-msg { color: var(--error); font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <div class="admin-login-logo">
      <div class="logo">Ele<span>Jeserys</span></div>
      <p>Panel de Administración</p>
    </div>

    <div class="error-msg" id="auth-error"></div>

    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-grupo">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-input" id="login-username" placeholder="admin" required>
      </div>
      <div class="form-grupo">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="login-pass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-amarillo" id="btn-login">Entrar al panel</button>
    </form>

    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--texto-muted)">
      <a href="/" style="color:var(--amarillo)">← Volver a la tienda</a>
    </p>
  </div>

  <script>
    const API = "/api";

    function showError(msg) {
      const el = document.getElementById("auth-error");
      el.textContent = msg;
      el.classList.toggle("show", !!msg);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-login");
      btn.textContent = "Entrando..."; btn.disabled = true;
      showError("");

      try {
        const res = await fetch(API + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("login-username").value,
            password: document.getElementById("login-pass").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        if (data.usuario.rol !== "admin") {
          throw new Error("Solo administradores pueden acceder.");
        }

        localStorage.setItem("ej_token", data.token);
        localStorage.setItem("ej_usuario", JSON.stringify(data.usuario));
        window.location.href = "/admin.html";
      } catch (err) {
        showError(err.message);
        btn.textContent = "Entrar al panel";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
